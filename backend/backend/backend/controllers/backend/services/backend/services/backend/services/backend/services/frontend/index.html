<!DOCTYPE html>
<html>
<head>
  <title>Universal Video Dubbing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Universal Video Dubbing (v1)</h1>
    <input type="file" id="videoInput" accept="video/*">
    <button id="uploadBtn">Upload & Dub</button>
    <div id="progressBar" class="progress-bar"></div>
    <div id="status"></div>
    <a id="downloadLink" style="display:none;">Download Dubbed Video</a>
  </div>
  <script src="script.js"></script>
</body>
</html>
